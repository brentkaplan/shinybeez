# Nginx Configuration for ShinyProxy
# ===================================
# This configuration provides:
# - HTTPS with Let's Encrypt SSL
# - WebSocket support for Shiny apps
# - Reverse proxy to ShinyProxy
# - Security headers
#
# Copy this to /etc/nginx/sites-available/shinyproxy
# Then: sudo ln -s /etc/nginx/sites-available/shinyproxy /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain name.

# ─────────────────────────────────────────────────────────────────────────
# RATE LIMITING ZONES
# These directives MUST be in the http context. If this file is included
# inside a server block, move these two lines to /etc/nginx/nginx.conf
# inside the http { } block.
# ─────────────────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ─────────────────────────────────────────────────────────────────────────
    # SSL CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL security settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (optional but recommended)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ─────────────────────────────────────────────────────────────────────────
    # SECURITY HEADERS
    # ─────────────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─────────────────────────────────────────────────────────────────────────
    # BOT SCAN BLOCKING
    # ─────────────────────────────────────────────────────────────────────────
    location ~* \.(env|git|sql|bak|config|ini)$ {
        return 404;
    }
    location ~* /(wp-admin|wp-login|xmlrpc\.php|\.well-known/security\.txt) {
        return 404;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # PROXY SETTINGS
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (required for Shiny apps)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Rate limiting — generous for real users, blocks mass bot scanning
        limit_req zone=general burst=20 nodelay;
        limit_req_status 429;

        # Timeouts (Shiny apps can be slow to start)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer settings
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Max upload size (for file uploads in Shiny)
        client_max_body_size 100M;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # STATIC FILES (optional - for custom assets)
    # ─────────────────────────────────────────────────────────────────────────
    location /static/ {
        limit_req zone=static burst=40 nodelay;
        alias /opt/shinyproxy/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
