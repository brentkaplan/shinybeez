services:
  shinybeez:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3838:3838"
    volumes:
      - ./logs:/home/shiny/shinybeez/logs
      - ./data:/home/shiny/shinybeez/data
    environment:
      - R_CONFIG_ACTIVE=default
      - TELEMETRY_ENABLED=false
      - GA_ENABLED=false
      - RHINO_LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3838"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
