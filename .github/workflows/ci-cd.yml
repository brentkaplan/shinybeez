# Shinybeez CI/CD Pipeline
# Automated testing, building, and deployment to ShinyProxy on Digital Ocean

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      full_tests:
        description: 'Run full integration tests'
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: brentkaplan/shinybeez
  SHINYBEEZ_FULL_TESTS: ${{ (github.ref == 'refs/heads/main' || github.event.inputs.full_tests == 'true') && 'true' || 'false' }}

jobs:
  # Test and validate the application
  test:
    runs-on: ubuntu-latest
    name: Test Application

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.1'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libcurl4-openssl-dev libssl-dev libxml2-dev \
          libpng-dev libcairo2-dev libicu-dev \
          cmake pkg-config gfortran unixodbc-dev pandoc

    - name: Setup renv
      uses: r-lib/actions/setup-renv@v2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install .rhino JS dependencies
      run: cd .rhino && npm ci

    - name: Install Chrome for integration tests
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Run linting
      run: |
        R -e "rhino::lint_r()"
        R -e "rhino::lint_js()"
        R -e "rhino::lint_sass()"

    - name: Run testthat tests
      env:
        CHROMOTE_CHROME: /usr/bin/google-chrome-stable
        TELEMETRY_ENABLED: "FALSE"
        GA_ENABLED: "FALSE"
        NOT_CRAN: "true"
      run: Rscript -e "testthat::test_dir('tests/testthat', reporter = 'summary', stop_on_failure = TRUE)"

  # Build and push Docker image
  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build Docker Image
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: brentkaplan
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker smoke test
      run: |
        docker build -t shinybeez-smoke .
        docker run -d --name smoke-test -p 3838:3838 \
          -e TELEMETRY_ENABLED=FALSE -e GA_ENABLED=FALSE shinybeez-smoke
        echo "Waiting for app to respond (up to 120s)..."
        for i in $(seq 1 12); do
          if curl -sf http://localhost:3838 > /dev/null 2>&1; then
            echo "App responded OK after $((i * 10))s"
            docker stop smoke-test && docker rm smoke-test
            exit 0
          fi
          echo "  attempt $i/12 — waiting 10s..."
          sleep 10
        done
        echo "ERROR: App did not respond within 120s"
        docker logs smoke-test
        docker stop smoke-test && docker rm smoke-test
        exit 1

    - name: Generate SBOM
      if: github.event_name != 'pull_request'
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json

  # Deploy to staging (develop branch only)
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment: staging

    steps:
    - name: Deploy to staging ShinyProxy
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        script: |
          docker pull brentkaplan/shinybeez:develop
          docker images brentkaplan/shinybeez:develop --format "{{.ID}} {{.CreatedAt}}"

  # Deploy to production (main branch and tags)
  deploy-production:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment: production

    steps:
    - name: Deploy to production ShinyProxy
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        script: |
          docker pull brentkaplan/shinybeez:latest
          docker images brentkaplan/shinybeez:latest --format "{{.ID}} {{.CreatedAt}}"
          docker image prune -f

  # Deploy to shinyapps.io (parallel to ShinyProxy)
  deploy-shinyapps:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to shinyapps.io
    environment: shinyapps

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.1'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libcurl4-openssl-dev libssl-dev libxml2-dev \
          libpng-dev libcairo2-dev libicu-dev \
          cmake pkg-config gfortran unixodbc-dev pandoc

    - name: Setup renv
      uses: r-lib/actions/setup-renv@v2

    - name: Install rsconnect
      run: Rscript -e "install.packages('rsconnect')"

    - name: Configure rsconnect
      run: |
        Rscript -e "rsconnect::setAccountInfo(name='${{ secrets.SHINYAPPS_NAME }}', token='${{ secrets.SHINYAPPS_TOKEN }}', secret='${{ secrets.SHINYAPPS_SECRET }}')"

    - name: Deploy to shinyapps.io
      run: |
        Rscript -e "
          Sys.setenv(R_CONFIG_ACTIVE = 'shinyapps')
          rsconnect::deployApp(
            appDir = '.',
            appName = 'shinybeez',
            account = '${{ secrets.SHINYAPPS_NAME }}',
            forceUpdate = TRUE,
            launch.browser = FALSE
          )
        "

  # Security scanning
  security:
    needs: build
    runs-on: ubuntu-latest
    name: Security Scan
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write

    steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: brentkaplan
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: docker.io/brentkaplan/shinybeez@${{ needs.build.outputs.image-digest }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  # Notify on completion
  notify:
    needs: [deploy-production, deploy-shinyapps]
    runs-on: ubuntu-latest
    name: Notify Deployment
    if: always() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
    - name: Deployment summary
      run: |
        echo "## Deployment Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Target | Status |" >> "$GITHUB_STEP_SUMMARY"
        echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| ShinyProxy | ${{ needs.deploy-production.result }} |" >> "$GITHUB_STEP_SUMMARY"
        echo "| shinyapps.io | ${{ needs.deploy-shinyapps.result }} |" >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if any deployment failed
      if: needs.deploy-production.result == 'failure' || needs.deploy-shinyapps.result == 'failure'
      run: exit 1
