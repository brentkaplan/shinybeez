# Shinybeez CI/CD Pipeline
# Automated testing, building, and deployment to ShinyProxy on Digital Ocean

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      full_tests:
        description: 'Run full integration tests'
        type: boolean
        default: true
      deploy_production:
        description: 'Deploy this ref to production targets'
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: brentkaplan/shinybeez
  SHINYBEEZ_FULL_TESTS: >-
    ${{
      github.event.inputs.full_tests == 'true'
      || (github.event_name == 'push' && (
        github.ref == 'refs/heads/develop'
        || github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/')
      ))
    }}

jobs:
  # Test and validate the application
  test:
    runs-on: ubuntu-latest
    name: Test Application

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.1'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          libcurl4-openssl-dev libssl-dev libxml2-dev \
          libpng-dev libcairo2-dev libicu-dev \
          cmake pkg-config gfortran unixodbc-dev pandoc

    - name: Setup renv
      uses: r-lib/actions/setup-renv@v2

    - name: Verify renv lockfile consistency
      run: >-
        Rscript -e
        'status <- renv::status();
        quit(status = if (isTRUE(status$synchronized)) 0L else 1L)'

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20'

    - name: Install .rhino JS dependencies
      run: cd .rhino && npm ci

    - name: Verify .rhino JS dependency compatibility
      run: npm --prefix .rhino ls --all

    - name: Install Chrome for integration tests
      uses: browser-actions/setup-chrome@v2
      with:
        chrome-version: stable

    - name: Run linting
      run: |
        R -e "rhino::lint_r()"
        R -e "rhino::lint_js()"
        R -e "rhino::lint_sass()"

    - name: Run testthat tests
      env:
        CHROMOTE_CHROME: /usr/bin/google-chrome-stable
        TELEMETRY_ENABLED: "FALSE"
        GA_ENABLED: "FALSE"
        NOT_CRAN: "true"
      run: Rscript -e "testthat::test_dir('tests/testthat', reporter = 'summary', stop_on_failure = TRUE)"

  # Build and push Docker image
  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build Docker Image
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: brentkaplan
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy_production) }}
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker smoke test
      run: |
        docker build -t shinybeez-smoke .
        docker run -d --name smoke-test -p 3838:3838 \
          -e TELEMETRY_ENABLED=FALSE -e GA_ENABLED=FALSE shinybeez-smoke
        echo "Waiting for app to respond (up to 120s)..."
        for i in $(seq 1 12); do
          if curl -sf http://localhost:3838 > /dev/null 2>&1; then
            echo "App responded OK after $((i * 10))s"
            docker stop smoke-test && docker rm smoke-test
            exit 0
          fi
          echo "  attempt $i/12 — waiting 10s..."
          sleep 10
        done
        echo "ERROR: App did not respond within 120s"
        docker logs smoke-test
        docker stop smoke-test && docker rm smoke-test
        exit 1

    - name: Generate SBOM
      if: github.event_name != 'pull_request'
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: sbom
        path: sbom.spdx.json

  # Deploy to staging (develop branch only)
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment: staging

    steps:
    - name: Deploy to staging ShinyProxy
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        script: |
          set -euo pipefail
          docker pull brentkaplan/shinybeez:develop
          docker images brentkaplan/shinybeez:develop --format "{{.ID}} {{.CreatedAt}}"
          docker image prune -f
          echo "Staging image refreshed. No ShinyProxy restart: shinybeez-develop has no pre-warmed seats, so"
          echo "the next on-demand session launches from the new image (a shared-service restart would drop"
          echo "production sessions in the shared JVM)."

  # Deploy to production for explicit releases only.
  deploy-production:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment: production

    steps:
    - name: Deploy to production ShinyProxy
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        script: |
          set -euo pipefail
          # Fail-closed guard using ShinyProxy's own recyclability signal (verified live on the droplet):
          #   GET :9090/actuator/recyclable -> {"isRecyclable":<bool>,"activeConnections":<int>}
          # A restart cycles the whole shared JVM (both specs), so proceed ONLY when ShinyProxy reports it is
          # recyclable with zero active connections; otherwise abort so a live session is never dropped. This is
          # authoritative and image-agnostic (a container/image filter misses containers on a now-dangling old
          # image — the exact stale case). No response / not-safe both abort (fail-closed).
          rec=$(curl -s -m 10 http://127.0.0.1:9090/actuator/recyclable 2>/dev/null || true)
          echo "recyclable probe: ${rec:-<no response>}"
          if ! printf '%s' "$rec" | grep -q '"isRecyclable":true' \
             || ! printf '%s' "$rec" | grep -qE '"activeConnections":0([,}]|$)'; then
            echo "Aborting restart: ShinyProxy not safely recyclable (need isRecyclable=true, activeConnections=0). Retry when idle."
            exit 1
          fi
          docker pull brentkaplan/shinybeez:latest
          docker images brentkaplan/shinybeez:latest --format "{{.ID}} {{.CreatedAt}}"
          docker image prune -f
          systemctl restart shinyproxy
          systemctl is-active --quiet shinyproxy || { echo "shinyproxy not active after restart"; exit 1; }
          for i in $(seq 1 12); do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8080/ || echo 000)
            echo "smoke attempt $i: ShinyProxy landing HTTP $code"
            if [ "$code" = "200" ]; then break; fi
            if [ "$i" = "12" ]; then echo "ShinyProxy did not return 200 within ~60s"; exit 1; fi
            sleep 5
          done

  # Deploy to shinyapps.io (parallel to ShinyProxy)
  deploy-shinyapps:
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to shinyapps.io
    environment: shinyapps

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.1'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          libcurl4-openssl-dev libssl-dev libxml2-dev \
          libpng-dev libcairo2-dev libicu-dev \
          cmake pkg-config gfortran unixodbc-dev pandoc

    - name: Setup renv
      uses: r-lib/actions/setup-renv@v2

    # NOTE: do NOT `install.packages('rsconnect')` here. renv is active (.Rprofile sources renv/activate.R), so
    # that would install current CRAN rsconnect over the lockfile-pinned rsconnect (renv.lock), desyncing the
    # library from the lockfile. rsconnect::deployApp() then aborts with
    # "parseRenvDependencies(): Library and lockfile are out of sync". `Setup renv` above already restores the
    # pinned rsconnect from renv.lock, which is what deployApp() needs.

    - name: Configure rsconnect
      run: |
        Rscript -e "rsconnect::setAccountInfo(name='${{ secrets.SHINYAPPS_NAME }}', token='${{ secrets.SHINYAPPS_TOKEN }}', secret='${{ secrets.SHINYAPPS_SECRET }}')"

    - name: Deploy to shinyapps.io
      run: |
        Rscript -e "
          Sys.setenv(R_CONFIG_ACTIVE = 'shinyapps')
          rsconnect::deployApp(
            appDir = '.',
            appName = 'shinybeez',
            account = '${{ secrets.SHINYAPPS_NAME }}',
            forceUpdate = TRUE,
            launch.browser = FALSE
          )
        "

  # Security scanning
  security:
    needs: build
    runs-on: ubuntu-latest
    name: Security Scan
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write

    steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: brentkaplan
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: docker.io/brentkaplan/shinybeez@${{ needs.build.outputs.image-digest }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'

  # Notify on completion
  notify:
    needs: [deploy-production, deploy-shinyapps]
    runs-on: ubuntu-latest
    name: Notify Deployment
    if: >-
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_production))

    steps:
    - name: Deployment summary
      run: |
        echo "## Deployment Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Target | Status |" >> "$GITHUB_STEP_SUMMARY"
        echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| ShinyProxy | ${{ needs.deploy-production.result }} |" >> "$GITHUB_STEP_SUMMARY"
        echo "| shinyapps.io | ${{ needs.deploy-shinyapps.result }} |" >> "$GITHUB_STEP_SUMMARY"

    - name: Fail if any deployment failed
      if: needs.deploy-production.result == 'failure' || needs.deploy-shinyapps.result == 'failure'
      run: exit 1
