# Shinybeez CI/CD Pipeline
# Automated testing, building, and deployment to ShinyProxy on Digital Ocean

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      full_tests:
        description: 'Run full integration tests'
        type: boolean
        default: true

env:
  REGISTRY: docker.io
  IMAGE_NAME: shinybeez
  DOCKER_USERNAME: brentkaplan
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  SHINYBEEZ_FULL_TESTS: ${{ (github.ref == 'refs/heads/main' || github.event.inputs.full_tests == 'true') && 'true' || 'false' }}

jobs:
  # Test and validate the application
  test:
    runs-on: ubuntu-latest
    name: Test Application

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.1'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

    - name: Setup renv
      uses: r-lib/actions/setup-renv@v2

    - name: Install Chrome for integration tests
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Run linting
      run: |
        R -e "rhino::lint_r()"
        R -e "rhino::lint_js()"
        R -e "rhino::lint_sass()"

    - name: Run testthat tests
      env:
        CHROMOTE_CHROME: /usr/bin/google-chrome-stable
        TELEMETRY_ENABLED: "FALSE"
        GA_ENABLED: "FALSE"
        NOT_CRAN: "true"
      run: Rscript -e "testthat::test_dir('tests/testthat', reporter = 'summary', stop_on_failure = TRUE)"

  # Build and push Docker image
  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build Docker Image
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: brentkaplan
        password: ${{ env.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/brentkaplan/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker smoke test
      run: |
        docker build -t shinybeez-smoke .
        docker run -d --name smoke-test -p 3838:3838 \
          -e TELEMETRY_ENABLED=FALSE -e GA_ENABLED=FALSE shinybeez-smoke
        echo "Waiting for app to respond (up to 120s)..."
        for i in $(seq 1 12); do
          if curl -sf http://localhost:3838 > /dev/null 2>&1; then
            echo "App responded OK after $((i * 10))s"
            docker stop smoke-test && docker rm smoke-test
            exit 0
          fi
          echo "  attempt $i/12 — waiting 10s..."
          sleep 10
        done
        echo "ERROR: App did not respond within 120s"
        docker logs smoke-test
        docker stop smoke-test && docker rm smoke-test
        exit 1

    - name: Generate SBOM
      if: github.event_name != 'pull_request'
      uses: anchore/sbom-action@v0
      with:
        image: ${{ steps.meta.outputs.tags }}
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v3
      with:
        name: sbom
        path: sbom.spdx.json

  # Deploy to staging (for PRs and develop branch)
  deploy-staging:
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    environment: staging

    steps:
    - name: Deploy to staging ShinyProxy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        script: |
          cd /opt/shinyproxy

          # Pull latest image
          docker pull ${{ needs.build.outputs.image-tag }}

          # Update staging configuration
          docker-compose -f docker-compose.staging.yml down shinybeez-staging
          docker-compose -f docker-compose.staging.yml up -d shinybeez-staging

          # Health check
          sleep 30
          curl -f http://localhost:8081/actuator/health || exit 1

    - name: Comment PR with staging URL
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🚀 Staging deployment ready!\n\n**Preview URL:** http://${{ secrets.STAGING_HOST }}:8081/app/shinybeez\n\n**Image:** `${{ needs.build.outputs.image-tag }}`'
          })

  # Deploy to production (for main branch and tags)
  deploy-production:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Production
    environment: production

    steps:
    - name: Deploy to production ShinyProxy
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        port: 22
        script: |
          cd /opt/shinyproxy

          # Backup current deployment
          docker tag shinybeez:current shinybeez:backup-$(date +%Y%m%d-%H%M%S) || true

          # Pull latest image
          docker pull ${{ needs.build.outputs.image-tag }}
          docker tag ${{ needs.build.outputs.image-tag }} shinybeez:current

          # Update production
          docker-compose down shinybeez
          docker-compose up -d shinybeez

          # Health check with retry
          for i in {1..10}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Health check passed"
              break
            fi
            echo "Health check failed, attempt $i/10"
            sleep 30
          done

          # If health check fails, rollback
          if ! curl -f http://localhost:8080/actuator/health; then
            echo "Deployment failed, rolling back"
            docker-compose down shinybeez
            docker tag shinybeez:backup-$(date +%Y%m%d) shinybeez:current
            docker-compose up -d shinybeez
            exit 1
          fi

          # Clean up old images (keep last 5)
          docker images shinybeez --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" | grep backup | tail -n +6 | awk '{print $1}' | xargs -r docker rmi || true

  # Deploy to shinyapps.io (parallel to ShinyProxy)
  deploy-shinyapps:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to shinyapps.io
    environment: shinyapps

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.5.1'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

    - name: Setup renv
      uses: r-lib/actions/setup-renv@v2

    - name: Install rsconnect
      run: Rscript -e "install.packages('rsconnect')"

    - name: Configure rsconnect
      run: |
        Rscript -e "rsconnect::setAccountInfo(name='${{ secrets.SHINYAPPS_NAME }}', token='${{ secrets.SHINYAPPS_TOKEN }}', secret='${{ secrets.SHINYAPPS_SECRET }}')"

    - name: Deploy to shinyapps.io
      run: |
        Rscript -e "
          Sys.setenv(R_CONFIG_ACTIVE = 'shinyapps')
          rsconnect::deployApp(
            appDir = '.',
            appName = 'shinybeez',
            account = '${{ secrets.SHINYAPPS_NAME }}',
            forceUpdate = TRUE,
            launch.browser = FALSE
          )
        "

  # Security scanning
  security:
    needs: build
    runs-on: ubuntu-latest
    name: Security Scan
    if: github.event_name != 'pull_request'

    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ needs.build.outputs.image-tag }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # Notify on completion
  notify:
    needs: [deploy-production, deploy-shinyapps]
    runs-on: ubuntu-latest
    name: Notify Deployment
    if: always() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
    - name: Notify success
      if: needs.deploy-production.result == 'success' && needs.deploy-shinyapps.result == 'success'
      run: |
        echo "🎉 Deployment successful!"
        echo "ShinyProxy: http://${{ secrets.PRODUCTION_HOST }}:8080"
        echo "shinyapps.io: https://${{ secrets.SHINYAPPS_NAME }}.shinyapps.io/shinybeez"

    - name: Notify failure
      if: needs.deploy-production.result == 'failure' || needs.deploy-shinyapps.result == 'failure'
      run: |
        echo "❌ Deployment failed!"
        exit 1
